<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Humanizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .container {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .api-row input {
      flex: 1;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.85rem;
      outline: none;
    }

    .api-row input:focus { border-color: #a78bfa; }

    .api-row label {
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 280px;
      padding: 14px;
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 10px;
      color: #e8e8f0;
      font-size: 0.95rem;
      line-height: 1.65;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #a78bfa; }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    select {
      padding: 9px 14px;
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #a78bfa; }

    button#humanizeBtn {
      flex: 1;
      padding: 12px 24px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button#humanizeBtn:hover { opacity: 0.9; transform: translateY(-1px); }
    button#humanizeBtn:active { transform: translateY(0); }
    button#humanizeBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    button#copyBtn {
      padding: 9px 18px;
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    button#copyBtn:hover { border-color: #a78bfa; }

    .status {
      font-size: 0.85rem;
      color: #888;
      min-height: 20px;
      text-align: center;
    }

    .status.error { color: #f87171; }
    .status.success { color: #4ade80; }

    .word-count {
      font-size: 0.75rem;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>

  <h1>AI Humanizer</h1>
  <p class="subtitle">Paste AI text → get natural, human-sounding writing that passes detection</p>

  <div class="container">

    <div class="api-row">
      <label>Groq API Key:</label>
      <input type="password" id="apiKey" placeholder="gsk_..." />
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-label">Your AI Text</div>
        <textarea id="inputText" placeholder="Paste your AI-generated text here..."></textarea>
        <div class="word-count" id="inputCount">0 words</div>
      </div>
      <div class="panel">
        <div class="panel-label">Humanized Output</div>
        <textarea id="outputText" placeholder="Your humanized text will appear here..." readonly></textarea>
        <div class="word-count" id="outputCount">0 words</div>
      </div>
    </div>

    <div class="controls">
      <select id="mode">
        <option value="standard">Standard — balanced rewrite</option>
        <option value="aggressive">Aggressive — max humanization</option>
        <option value="subtle">Subtle — light touch</option>
      </select>
      <button id="humanizeBtn" onclick="humanize()">✦ Humanize</button>
      <button id="copyBtn" onclick="copyOutput()">Copy</button>
    </div>

    <div class="status" id="status"></div>

  </div>

<script>
  const inputEl = document.getElementById('inputText');
  const outputEl = document.getElementById('outputText');
  const statusEl = document.getElementById('status');

  inputEl.addEventListener('input', () => {
    document.getElementById('inputCount').textContent = wordCount(inputEl.value) + ' words';
  });

  function wordCount(text) {
    return text.trim() ? text.trim().split(/\s+/).length : 0;
  }

  function setStatus(msg, type = '') {
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }

  async function humanize() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const inputText = inputEl.value.trim();
    const mode = document.getElementById('mode').value;
    const btn = document.getElementById('humanizeBtn');

    if (!apiKey) return setStatus('Please enter your Groq API key above.', 'error');
    if (!inputText) return setStatus('Please paste some text to humanize.', 'error');

    btn.disabled = true;
    setStatus('Humanizing... this takes about 10–20 seconds.');

    const modeInstructions = {
      standard: `Rewrite the text so it sounds naturally human. Use a mix of short and longer sentences. Simplify vocabulary — use everyday words instead of formal or academic ones. Add natural transitions. Vary sentence structure. Do NOT use the words: delve, crucial, it's worth noting, multifaceted, comprehensive, leverage, utilize, furthermore, moreover, in conclusion, ultimately, embark. Keep the same meaning and approximately the same length.`,
      aggressive: `Completely rewrite the text from scratch as if a real person is writing it casually but intelligently. Use very natural, conversational phrasing. Include minor imperfections like starting sentences with "And" or "But" occasionally. Use contractions (it's, don't, that's). Break up long complex sentences into shorter ones. Simplify everything. Avoid any word that sounds like AI wrote it. Keep the exact same meaning and similar length.`,
      subtle: `Lightly rewrite the text to sound more human. Keep most of the structure but vary sentence rhythm, simplify a few overly formal words, and add natural transitions. Preserve the meaning and length closely.`
    };

    const prompt = `You are an expert editor who rewrites AI-generated text to sound completely human-written. Your goal is to make the text pass AI detection tools like Turnitin and GPTZero.

Instructions:
${modeInstructions[mode]}

Important rules:
- Output ONLY the rewritten text. No explanations, no preamble, no "Here is the rewritten version:".
- Do not add headers or bullet points unless the original had them.
- Match the approximate word count of the original.

Original text to rewrite:
${inputText}`;

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.85,
          max_tokens: 4096
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API error — check your API key.');
      }

      const result = data.choices[0].message.content.trim();
      outputEl.value = result;
      document.getElementById('outputCount').textContent = wordCount(result) + ' words';
      setStatus('Done! Review the output and copy it below.', 'success');

    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    }

    btn.disabled = false;
  }

  function copyOutput() {
    if (!outputEl.value) return setStatus('Nothing to copy yet.', 'error');
    navigator.clipboard.writeText(outputEl.value);
    setStatus('Copied to clipboard!', 'success');
    setTimeout(() => setStatus(''), 2000);
  }
</script>
</body>
</html>
